{{ if (.Context.Scratch.Get "TOCEnabled") }}
    <section class="widget archives toc-widget">
        <h2 class="widget-title section-title">
            <span class="widget-icon-inline">{{ partial "helper/icon" "hash" }}</span>
            {{ T "article.tableOfContents" }}
        </h2>

        <div class="widget--toc">
            <nav class="toc-nav" id="TableOfContents">
                {{ partial "article/components/toc" .Context | safeHTML }}
            </nav>
        </div>
    </section>
{{ end }}
