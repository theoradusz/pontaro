<!-- Netlify Identity redirect: add to the site's head -->
<!-- This ensures that after login, the user is redirected to /admin/ -->
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
