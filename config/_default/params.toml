mainSections   = ["post"]
rssFullContent = true

[footer]
    since = 2026

[dateFormat]
    published   = ":date_full"
    lastUpdated = ":date_full"

[sidebar]
    emoji    = "📝"
    subtitle = "Welcome to my blog"

[article]
    headingAnchor = false
    math          = false
    toc           = true
    readingTime   = true
    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[colorScheme]
    toggle  = true
    default = "auto"

[imageProcessing.cover]
    enabled = true

[imageProcessing.content]
    enabled = true

[comments]
    enabled = false
